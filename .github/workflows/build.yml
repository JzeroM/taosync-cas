name: 构建和推送Docker镜像

on:
  push:
    branches: [ 'main' ]
    paths: [ 'version.txt' ]

env:
  APP_NAME: taoSync
  DOCKER_USER: miuior
  DOCKER_NAME: taosync-cas

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.getVersion.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - id: getVersion
        name: 获取版本号
        run: |
          VERSION=$(head -n 1 version.txt | cut -d',' -f1)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [ get-version ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "14.x"

      - name: 构建前端
        run: |
          if [ -f "frontend/src/views/page/setting/index.vue" ]; then
            sed -i "s/__version_placeholder__/$VERSION/g" frontend/src/views/page/setting/index.vue
          fi
          
          if [ -d "frontend" ]; then
            cd frontend
            npm install
            npm run build
          else
            echo "前端目录不存在，跳过前端构建"
            mkdir -p frontend/dist
          fi

      - name: 上传artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-docker:
    name: 构建Docker镜像
    runs-on: ubuntu-latest
    needs: [ get-version, build-frontend ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 设置QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 获取GitHub用户名（小写）
        id: get-gh-username
        run: |
          # GitHub Container Registry要求用户名全小写
          # 从仓库信息获取所有者并转换为小写
          REPO_OWNER="${{ github.repository_owner }}"
          LOWERCASE_OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "GitHub用户名（原始）: $REPO_OWNER"
          echo "GitHub用户名（小写）: $LOWERCASE_OWNER"
          echo "GH_USERNAME=$LOWERCASE_OWNER" >> $GITHUB_OUTPUT

      - name: 登录到GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建和推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/${{ env.DOCKER_NAME }}:latest
            ${{ env.DOCKER_USER }}/${{ env.DOCKER_NAME }}:${{ env.VERSION }}
            ghcr.io/${{ steps.get-gh-username.outputs.GH_USERNAME }}/${{ env.DOCKER_NAME }}:latest
            ghcr.io/${{ steps.get-gh-username.outputs.GH_USERNAME }}/${{ env.DOCKER_NAME }}:${{ env.VERSION }}

      - name: 输出镜像信息
        run: |
          echo "🎉 Docker镜像构建完成！"
          echo ""
          echo "📦 镜像已推送到以下仓库:"
          echo ""
          echo "1. 🐋 Docker Hub:"
          echo "   - docker pull $DOCKER_USER/$DOCKER_NAME:latest"
          echo "   - docker pull $DOCKER_USER/$DOCKER_NAME:$VERSION"
          echo ""
          echo "2. 📦 GitHub Container Registry:"
          echo "   - docker pull ghcr.io/${{ steps.get-gh-username.outputs.GH_USERNAME }}/$DOCKER_NAME:latest"
          echo "   - docker pull ghcr.io/${{ steps.get-gh-username.outputs.GH_USERNAME }}/$DOCKER_NAME:$VERSION"
          echo ""
          echo "🔧 使用示例:"
          echo "   docker run -d -p 8023:8023 $DOCKER_USER/$DOCKER_NAME:$VERSION"
          echo "   或"
          echo "   docker run -d -p 8023:8023 ghcr.io/${{ steps.get-gh-username.outputs.GH_USERNAME }}/$DOCKER_NAME:$VERSION"

  create-release:
    name: 创建Release
    runs-on: ubuntu-latest
    needs: [ get-version, build-docker ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') }}

    steps:
      - name: 获取GitHub用户名（小写）
        id: get-gh-username
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          LOWERCASE_OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "GH_USERNAME=$LOWERCASE_OWNER" >> $GITHUB_OUTPUT

      - name: 创建release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION }}
          name: "TaoSync v${{ env.VERSION }}"
          body: |
            ## 🎉 TaoSync ${{ env.VERSION }}
            
            ### 🐋 Docker Hub
