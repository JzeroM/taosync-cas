name: 构建TaoSync

on:
  push:
    branches: ["main"]
    paths: ["version.txt"]

env:
  APP_NAME: taoSync
  DOCKER_USER: miuior
  DOCKER_NAME: taosync-cas

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      TAG_LIST: ${{ steps.getVersion.outputs.TAG_LIST }}
      VERSION: ${{ steps.getVersion.outputs.VERSION }}
      PUSH_TO_DOCKERHUB: ${{ steps.getVersion.outputs.PUSH_TO_DOCKERHUB }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 读取版本
        id: getVersion
        run: |
          versions=$(head -n 1 version.txt)
          tagList=""
          IFS=',' read -ra versionList <<< "$versions"
          cuVersion="${versionList[0]}"
          pushToDockerHub="false"
          
          for version in "${versionList[@]}"; do
            tagList+="-t $DOCKER_USER/$DOCKER_NAME:$version "
            if [[ ! "$version" =~ (dev|pre|beta) ]]; then
              pushToDockerHub="true"
            fi
          done
          
          echo "TAG_LIST=$tagList" >> "$GITHUB_OUTPUT"
          echo "VERSION=$cuVersion" >> "$GITHUB_OUTPUT"
          echo "PUSH_TO_DOCKERHUB=$pushToDockerHub" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [get-version]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "16"
      
      - name: 构建前端
        run: |
          sed -i "s/__version_placeholder__/$VERSION/g" frontend/src/views/page/setting/index.vue
          cd frontend
          npm install
          npm run build
      
      - name: 上传前端
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-docker:
    name: 构建Docker镜像
    runs-on: ubuntu-latest
    needs: [get-version, build-frontend]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
      PUSH_TO_DOCKERHUB: ${{ needs.get-version.outputs.PUSH_TO_DOCKERHUB }}
    
    steps:
      - name: 设置QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: 设置BuildX
        uses: docker/setup-buildx-action@v3
      
      - name: 登录Docker Hub
        if: env.PUSH_TO_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: 登录GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      
      - name: 推送到Docker Hub
        if: env.PUSH_TO_DOCKERHUB == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/${{ env.DOCKER_NAME }}:${{ env.VERSION }}
            ${{ env.DOCKER_USER }}/${{ env.DOCKER_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      
      - name: 推送到GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ env.DOCKER_USER }}/${{ env.DOCKER_NAME }}:${{ env.VERSION }},${{ env.DOCKER_USER }}/${{ env.DOCKER_NAME }}:latest,${{ github.repository_owner }}/${{ env.DOCKER_NAME }}:${{ env.VERSION }}
          labels: org.opencontainers.image.version=${{ env.VERSION }},org.opencontainers.image.source=https://github.com/${{ github.repository }}

  build-source-packages:
    name: 构建源码包
    runs-on: ubuntu-latest
    needs: [get-version, build-frontend]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      
      - name: 创建源码包
        run: |
          mkdir -p "taosync-$VERSION"
          cp -r *.py *.txt *.spec service/ common/ controller/ mapper/ "taosync-$VERSION/"
          mkdir -p "taosync-$VERSION/frontend/dist"
          cp -r frontend/dist/* "taosync-$VERSION/frontend/dist/"
          
          cat > "taosync-$VERSION/start.sh" << 'EOF'
#!/bin/bash
cd "$(dirname "$0")"
python3 -m venv venv
source venv/bin/activate
pip install -r requirements.txt
python main.py
EOF
          
          chmod +x "taosync-$VERSION/start.sh"
          
          tar czf "taosync-$VERSION-source.tar.gz" "taosync-$VERSION/"
      
      - name: 上传源码包
        uses: actions/upload-artifact@v4
        with:
          name: source-package
          path: "taosync-${{ env.VERSION }}-source.tar.gz"
          retention-days: 1

  build-windows-package:
    name: 构建Windows包
    runs-on: windows-latest
    needs: [get-version, build-frontend]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      
      - name: 创建Windows包
        run: |
          $releaseDir = "taosync-$env:VERSION-windows-amd64"
          New-Item -ItemType Directory -Force -Path $releaseDir
          
          Copy-Item -Path *.py,*.txt,*.spec -Destination $releaseDir/ -Force
          Copy-Item -Path service/,common/,controller/,mapper/ -Destination $releaseDir/ -Recurse -Force
          New-Item -ItemType Directory -Force -Path "$releaseDir/frontend/dist"
          Copy-Item -Path frontend/dist/* -Destination "$releaseDir/frontend/dist/" -Recurse -Force
          
          'python main.py' | Out-File -FilePath "$releaseDir/taosync.bat" -Encoding utf8
          
          Compress-Archive -Path $releaseDir/* -DestinationPath "taosync-$env:VERSION-windows-amd64.zip" -Force
      
      - name: 上传Windows包
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: "taosync-${{ env.VERSION }}-windows-amd64.zip"

  build-macos-package:
    name: 构建macOS包
    runs-on: macos-latest
    needs: [get-version, build-frontend]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      
      - name: 创建macOS包
        run: |
          RELEASE_DIR="taosync-$VERSION-macos-universal"
          mkdir -p "$RELEASE_DIR"
          
          cp *.py *.txt *.spec "$RELEASE_DIR/" 2>/dev/null || true
          cp -r service common controller mapper "$RELEASE_DIR/"
          mkdir -p "$RELEASE_DIR/frontend/dist"
          cp -r frontend/dist/* "$RELEASE_DIR/frontend/dist/"
          
          echo '#!/bin/bash' > "$RELEASE_DIR/taosync.sh"
          echo 'cd "$(dirname "$0")"' >> "$RELEASE_DIR/taosync.sh"
          echo 'python3 main.py' >> "$RELEASE_DIR/taosync.sh"
          
          chmod +x "$RELEASE_DIR/taosync.sh"
          
          tar czf "taosync-$VERSION-macos-universal.tar.gz" "$RELEASE_DIR/"
      
      - name: 上传macOS包
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: "taosync-${{ env.VERSION }}-macos-universal.tar.gz"
          retention-days: 1

  create-release:
    name: 创建发布
    runs-on: ubuntu-latest
    needs: [get-version, build-windows-package, build-macos-package, build-source-packages, build-docker]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 下载所有构建结果
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 创建版本日志
        run: |
          echo "# 版本 $VERSION" > "changelog-$VERSION.md"
          echo "" >> "changelog-$VERSION.md"
          echo "## 更新内容" >> "changelog-$VERSION.md"
          echo "- 自动构建发布" >> "changelog-$VERSION.md"
          echo "" >> "changelog-$VERSION.md"
          echo "## Docker镜像" >> "changelog-$VERSION.md"
          echo "- Docker Hub: \`miuior/taosync-cas:$VERSION\`" >> "changelog-$VERSION.md"
          echo "- GitHub Container Registry: \`${{ github.repository_owner }}/taosync-cas:$VERSION\`" >> "changelog-$VERSION.md"
      
      - name: 发布到GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: artifacts/**/*
          body_path: "changelog-${{ env.VERSION }}.md"
          prerelease: ${{ contains(env.VERSION, 'dev') || contains(env.VERSION, 'pre') || contains(env.VERSION, 'beta') }}
