name: 构建

on:
  push:
    branches: [ 'main' ]
    paths: [ 'version.txt' ]

env:
  APP_NAME: taoSync
  DOCKER_USER: miuior
  DOCKER_NAME: taosync-cas

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      TAG_LIST: ${{ steps.getVersion.outputs.TAG_LIST }}
      VERSION: ${{ steps.getVersion.outputs.VERSION }}
      PUSH_TO_DOCKERHUB: ${{ steps.getVersion.outputs.PUSH_TO_DOCKERHUB }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - id: getVersion
        name: 获取版本号
        run: |
          versions=$(head -n 1 version.txt)
          tagList=""
          IFS=',' read -ra versionList <<< "$versions"
          cuVersion="${versionList[0]}"
          
          pushToDockerHub="false"
          for version in "${versionList[@]}"; do
            tagList+="-t $DOCKER_USER/$DOCKER_NAME:$version "
            
            if [[ ! "$version" =~ (dev|pre|beta) ]]; then
              pushToDockerHub="true"
            fi
          done
          
          echo "TAG_LIST=$tagList" >> "$GITHUB_OUTPUT"
          echo "VERSION=$cuVersion" >> "$GITHUB_OUTPUT"
          echo "PUSH_TO_DOCKERHUB=$pushToDockerHub" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [ get-version ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "16"

      - name: 安装依赖并构建前端
        run: |
          sed -i "s/__version_placeholder__/$VERSION/g" frontend/src/views/page/setting/index.vue
          cd frontend
          npm install
          npm run build

      - name: 上传前端构建结果
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-docker:
    name: 构建Docker镜像
    runs-on: ubuntu-latest
    needs: [ get-version, build-frontend ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner | lower }}/${{ env.DOCKER_NAME }}
      PUSH_TO_DOCKERHUB: ${{ needs.get-version.outputs.PUSH_TO_DOCKERHUB }}
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
          - linux/386
          - linux/arm/v6
          - linux/s390x
          - linux/ppc64le

    steps:
      - name: 设置QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置Docker BuildX
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: 登录到DockerHub
        if: env.PUSH_TO_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录到GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 构建Docker镜像
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          outputs: type=docker,compression=zstd

      - name: 推送到Docker Hub
        if: env.PUSH_TO_DOCKERHUB == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/${{ env.DOCKER_NAME }}:${{ env.VERSION }}
            ${{ env.DOCKER_USER }}/${{ env.DOCKER_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: 推送到GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.VERSION }}
            ${{ env.GHCR_IMAGE }}:latest
          labels: |
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  build-source-packages:
    name: 构建源代码包
    runs-on: ubuntu-latest
    needs: [get-version, build-frontend]
    env:
      VERSION: ${{needs.get-version.outputs.VERSION}}
    
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 创建源码包
        run: |
          mkdir -p taosync-$VERSION
          cp -r *.py *.txt *.spec service/ common/ controller/ mapper/ taosync-$VERSION/
          mkdir -p taosync-$VERSION/frontend/dist
          cp -r frontend/dist/* taosync-$VERSION/frontend/dist/
          
          cat > taosync-$VERSION/start.sh << 'EOF'
#!/bin/bash
cd "$(dirname "$0")"
python3 -m venv venv
source venv/bin/activate
pip install -r requirements.txt
python main.py
EOF
          chmod +x taosync-$VERSION/start.sh
          
          cat > taosync-$VERSION/start.bat << 'EOF'
@echo off
cd /d "%~dp0"
python -m venv venv
call venv\Scripts\activate.bat
pip install -r requirements.txt
python main.py
EOF
          
          tar czf "taosync-$VERSION-source.tar.gz" taosync-$VERSION/

      - name: 上传源码包
        uses: actions/upload-artifact@v4
        with:
          name: source-package
          path: taosync-$VERSION-source.tar.gz
          retention-days: 1

  build-windows-python:
    name: 构建Windows包
    runs-on: windows-latest
    needs: [get-version, build-frontend]
    env:
      VERSION: ${{needs.get-version.outputs.VERSION}}
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 创建Windows包
        run: |
          $releaseDir = "taosync-$env:VERSION-windows-amd64"
          New-Item -ItemType Directory -Force -Path $releaseDir
          
          Copy-Item -Path *.py,*.txt,*.spec -Destination $releaseDir/ -Force
          Copy-Item -Path service/,common/,controller/,mapper/ -Destination $releaseDir/ -Recurse -Force
          New-Item -ItemType Directory -Force -Path "$releaseDir/frontend/dist"
          Copy-Item -Path frontend/dist/* -Destination "$releaseDir/frontend/dist/" -Recurse -Force
          
          $startBat = @'
@echo off
cd /d "%~dp0"
echo 检查Python环境...
python --version >nul 2>&1
if errorlevel 1 (
    echo 错误: 未找到Python，请先安装Python 3.11+
    echo 可以从 https://www.python.org/downloads/ 下载
    pause
    exit /b 1
)

echo 安装依赖...
pip install -r requirements.txt
if errorlevel 1 (
    echo 错误: 依赖安装失败
    pause
    exit /b 1
)

echo 启动TaoSync...
python main.py
pause
'@
          $startBat | Out-File -FilePath "$releaseDir/start-taosync.bat" -Encoding UTF8
          
          $simpleBat = @'
@echo off
cd /d "%~dp0"
python main.py
'@
          $simpleBat | Out-File -FilePath "$releaseDir/taosync.bat" -Encoding UTF8
          
          Compress-Archive -Path $releaseDir/* -DestinationPath "taosync-$env:VERSION-windows-amd64.zip" -Force

      - name: 上传Windows包
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: taosync-${{ env.VERSION }}-windows-amd64.zip

  build-darwin-python:
    name: 构建macOS包
    runs-on: macos-latest
    needs: [get-version, build-frontend]
    env:
      VERSION: ${{needs.get-version.outputs.VERSION}}
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 创建macOS包
        run: |
          RELEASE_DIR="taosync-$VERSION-macos-universal"
          mkdir -p "$RELEASE_DIR"
          
          cp *.py *.txt *.spec "$RELEASE_DIR/" 2>/dev/null || true
          cp -r service common controller mapper "$RELEASE_DIR/"
          mkdir -p "$RELEASE_DIR/frontend/dist"
          cp -r frontend/dist/* "$RELEASE_DIR/frontend/dist/"
          
          cat > "$RELEASE_DIR/start-taosync.sh" << 'EOF'
#!/bin/bash
cd "$(dirname "$0")"
echo "检查Python环境..."
python3 --version >/dev/null 2>&1
if [ $? -ne 0 ]; then
    echo "错误: 未找到Python3，请先安装Python 3.11+"
    echo "可以从 https://www.python.org/downloads/ 下载"
    exit 1
fi

echo "安装依赖..."
pip3 install -r requirements.txt
if [ $? -ne 0 ]; then
    echo "错误: 依赖安装失败"
    exit 1
fi

echo "启动TaoSync..."
python3 main.py
EOF
          chmod +x "$RELEASE_DIR/start-taosync.sh"
          
          cat > "$RELEASE_DIR/taosync.sh" << 'EOF'
#!/bin/bash
cd "$(dirname "$0")"
python3 main.py
EOF
          chmod +x "$RELEASE_DIR/taosync.sh"
          
          tar czf "taosync-$VERSION-macos-universal.tar.gz" "$RELEASE_DIR/"

      - name: 上传macOS包
        uses: actions/upload-artifact@v4
        with:
          name: darwin-package
          path: taosync-${{ env.VERSION }}-macos-universal.tar.gz
          retention-days: 1

  create-release:
    name: 发布Release
    runs-on: ubuntu-latest
    needs: [get-version, build-windows-python, build-darwin-python, build-source-packages, build-docker]
    env:
      VERSION: ${{needs.get-version.outputs.VERSION}}
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载所有构建结果
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: true

      - name: 创建版本日志
        run: |
          version_first=$(echo $VERSION | cut -d'-' -f1)
          LOG_FILE="changelog-$version_first.md"
          
          if [ -f "doc/changelog/$version_first.md" ]; then
            cp "doc/changelog/$version_first.md" "$LOG_FILE"
          else
            echo "# 版本 $VERSION" > "$LOG_FILE"
            echo "" >> "$LOG_FILE"
            echo "## 更新内容" >> "$LOG_FILE"
            echo "- 自动构建发布" >> "$LOG_FILE"
            echo "" >> "$LOG_FILE"
            echo "## Docker镜像" >> "$LOG_FILE"
            echo "- Docker Hub: \`miuior/taosync-cas:$VERSION\`" >> "$LOG_FILE"
            echo "- GitHub Container Registry: \`ghcr.io/jzerom/taosync-cas:$VERSION\`" >> "$LOG_FILE"
          fi

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: artifacts/**/*
          body_path: changelog-${{ env.VERSION }}.md
          prerelease: ${{ contains(env.VERSION, 'dev') || contains(env.VERSION, 'pre') || contains(env.VERSION, 'beta') }}
