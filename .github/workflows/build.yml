name: 构建TaoSync

on:
  push:
    branches: ['main']
    paths: ['version.txt']

env:
  APP_NAME: taoSync
  DOCKER_USER: miuior
  DOCKER_NAME: taosync-cas

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      TAG_LIST: ${{ steps.getVersion.outputs.TAG_LIST }}
      VERSION: ${{ steps.getVersion.outputs.VERSION }}
      PUSH_TO_DOCKERHUB: ${{ steps.getVersion.outputs.PUSH_TO_DOCKERHUB }}
    steps:
    - uses: actions/checkout@v4
    - id: getVersion
      run: |
        version=$(head -n 1 version.txt)
        tag="-t $DOCKER_USER/$DOCKER_NAME:$version"
        if [[ "$version" =~ (dev|pre|beta) ]]; then
          push="false"
        else
          push="true"
        fi
        echo "TAG_LIST=$tag" >> "$GITHUB_OUTPUT"
        echo "VERSION=$version" >> "$GITHUB_OUTPUT"
        echo "PUSH_TO_DOCKERHUB=$push" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [get-version]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: "16"
    - run: |
        cd frontend
        npm install
        npm run build
    - uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

  build-docker:
    name: 构建Docker镜像
    runs-on: ubuntu-latest
    needs: [get-version, build-frontend]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner | lower }}/${{ env.DOCKER_NAME }}
      PUSH_TO_DOCKERHUB: ${{ needs.get-version.outputs.PUSH_TO_DOCKERHUB }}
    steps:
    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v3
    - if: env.PUSH_TO_DOCKERHUB == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USER }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist
    - uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: ${{ env.DOCKER_USER }}/${{ env.DOCKER_NAME }}:${{ env.VERSION }},${{ env.GHCR_IMAGE }}:${{ env.VERSION }}
        labels: version=${{ env.VERSION }}

  build-packages:
    name: 构建程序包
    runs-on: ubuntu-latest
    needs: [get-version, build-frontend]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist
    - run: |
        mkdir -p "taosync-$VERSION"
        cp -r *.py *.txt *.spec service/ common/ controller/ mapper/ "taosync-$VERSION/"
        mkdir -p "taosync-$VERSION/frontend/dist"
        cp -r frontend/dist/* "taosync-$VERSION/frontend/dist/"
        echo '#!/bin/bash' > "taosync-$VERSION/start.sh"
        echo 'cd "$(dirname "$0")"' >> "taosync-$VERSION/start.sh"
        echo 'python3 main.py' >> "taosync-$VERSION/start.sh"
        chmod +x "taosync-$VERSION/start.sh"
        tar czf "taosync-$VERSION-source.tar.gz" "taosync-$VERSION/"
    - uses: actions/upload-artifact@v4
      with:
        name: source-package
        path: "taosync-${{ env.VERSION }}-source.tar.gz"

  create-release:
    name: 创建发布
    runs-on: ubuntu-latest
    needs: [get-version, build-packages, build-docker]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - run: echo "# 版本 $VERSION" > "changelog-$VERSION.md"
    - uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        files: artifacts/**/*
        body_path: "changelog-${{ env.VERSION }}.md"
        prerelease: ${{ contains(env.VERSION, 'dev') || contains(env.VERSION, 'pre') || contains(env.VERSION, 'beta') }}
